<body>
<!-- INSTRUCCIÓN: Conserva tu archivo original. Reemplaza SOLO el bloque runAI() por este: -->
<script>
function runAI(){
  if(!FD.imageUrl){showErr('Primero sube una imagen.');return;}
  clearErr();
  const prompt=`Analiza esta evidencia según GTC 45 Colombia y devuelve JSON con: riskFactor, riskDetail, description, probabilityLevel, consequenceLevel, intervention, action.`;
  const texto = prompt + '\n\n1. Abre ChatGPT o Google AI Studio.\n2. Sube la imagen.\n3. Pega este prompt.\n4. Copia el JSON devuelto y pégalo abajo.';
  const box = document.getElementById('aires');
  box.innerHTML = `
    <div class="aibox">
      <div class="aibox-t">Asistente IA externo</div>
      <textarea id="iaPastePrompt" style="width:100%;min-height:120px">${prompt}</textarea>
      <textarea id="iaPasteResult" placeholder="Pega aquí la respuesta JSON de la IA" style="width:100%;min-height:160px;margin-top:8px"></textarea>
      <button class="btn bp" onclick="applyExternalAI()" style="margin-top:8px">Aplicar respuesta IA</button>
    </div>`;
}
function applyExternalAI(){
  try{
    const raw=document.getElementById('iaPasteResult').value.trim();
    const data=JSON.parse(raw);
    AIF=[];
    ['riskFactor','riskDetail','description','probabilityLevel','consequenceLevel','intervention','action'].forEach(k=>{if(data[k]){FD[k]=data[k];AIF.push(k);}});
    showModal();
    const res2=document.getElementById('aires');
    if(res2)res2.innerHTML='<div class="aibox"><div class="aibox-t">✓ Datos importados</div><p>Campos completados desde IA externa.</p></div>';
  }catch(e){showErr('JSON inválido. Copia la respuesta exacta de la IA.');}
}
</script>
<!-- Agregar librería DOCX antes de </body> -->
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script>
function exportWordFinding(id){
  const f=ST.findings.find(x=>x.id===id); if(!f) return;
  const { Document, Packer, Paragraph, TextRun } = docx;
  const doc = new Document({ sections:[{ children:[
    new Paragraph({children:[new TextRun({text:'INFORME DE INSPECCIÓN SST', bold:true, size:28})]}),
    new Paragraph('Fecha: '+f.date),
    new Paragraph('Área: '+f.area),
    new Paragraph('Factor de Riesgo: '+f.riskFactor+' - '+f.riskDetail),
    new Paragraph('Descripción: '+f.description),
    new Paragraph('Acción de mejora: '+f.action)
  ]}]});
  Packer.toBlob(doc).then(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='Informe_'+f.id+'.docx';
    a.click();
  });
}
</script>
</body>
</html>
