<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal SST – GTC 45</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--surf:#fff;--surf2:#f6f7fb;--bord:#e4e8f0;
  --txt:#111827;--mut:#6b7280;
  --blue:#1d4ed8;--blue-l:#eff6ff;--blue-d:#1e40af;
  --red:#dc2626;--red-l:#fef2f2;
  --green:#059669;--green-l:#ecfdf5;
  --amb:#d97706;--amb-l:#fffbeb;
  --r:13px;--rs:8px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shl:0 8px 32px rgba(0,0,0,.15)
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
img{display:block;max-width:100%}

/* ── LAYOUT ──────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:228px;flex-shrink:0;background:var(--surf);
  border-right:1px solid var(--bord);
  display:flex;flex-direction:column;z-index:50
}
.logo{padding:20px 18px 14px;border-bottom:1px solid var(--bord)}
.logo h1{font-size:15px;font-weight:900;color:var(--blue);letter-spacing:-.3px}
.logo p{font-size:11px;color:var(--mut);margin-top:2px;font-weight:500}
.nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.ni{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--rs);
  font-size:13.5px;font-weight:500;color:var(--mut);cursor:pointer;
  transition:all .12s;user-select:none}
.ni:hover{background:var(--surf2);color:var(--txt)}
.ni.on{background:var(--blue-l);color:var(--blue);font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  background:var(--surf);border-bottom:1px solid var(--bord);
  padding:12px 22px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0
}
.topbar h2{font-size:16px;font-weight:800;letter-spacing:-.3px}
.content{flex:1;overflow-y:auto;padding:22px}

/* ── CARDS ───────────────────────────── */
.card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.slbl{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.sval{font-size:28px;font-weight:900;letter-spacing:-1px;margin-top:3px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.ctitle{font-size:13px;font-weight:700;margin-bottom:12px}

/* ── BUTTONS ─────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;
  border-radius:var(--rs);font-weight:700;font-size:13px;
  transition:all .12s;cursor:pointer;border:none;line-height:1}
.bp{background:var(--blue);color:#fff}
.bp:hover{background:var(--blue-d)}
.bo{background:transparent;color:var(--txt);border:1.5px solid var(--bord)}
.bo:hover{border-color:#9ca3af}
.bsm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* ── TABLE ───────────────────────────── */
.twrap{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.tbar{padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--bord)}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--mut);
  background:var(--surf2);border-bottom:1px solid var(--bord);white-space:nowrap}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--surf2)}
tbody td{padding:10px 14px;border-bottom:1px solid var(--bord);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.acts{display:flex;gap:4px;opacity:0;transition:opacity .1s}
tbody tr:hover .acts{opacity:1}

/* ── BADGES ──────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;
  border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap;line-height:1.6}
.bopen{background:#f1f5f9;color:#475569}
.bprog{background:#fef9c3;color:#a16207}
.bdone{background:#dcfce7;color:#16a34a}
.bri{background:#fee2e2;color:#b91c1c}
.brii{background:#ffedd5;color:#c2410c}
.briii{background:#fef9c3;color:#a16207}
.briv{background:#dcfce7;color:#15803d}

/* ── SEARCH / FILTER ─────────────────── */
.sw{position:relative;flex:1;min-width:160px}
.sw input{width:100%;padding:7px 10px 7px 30px;border:1.5px solid var(--bord);
  border-radius:var(--rs);outline:none;transition:border-color .15s;background:var(--surf);font-size:13px}
.sw input:focus{border-color:var(--blue)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--mut);pointer-events:none;font-size:13px}
select.fil{padding:7px 10px;border:1.5px solid var(--bord);border-radius:var(--rs);
  background:var(--surf);outline:none;font-size:13px;color:var(--txt);cursor:pointer}
select.fil:focus{border-color:var(--blue)}

/* ── MODAL ───────────────────────────── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px 14px;overflow-y:auto}
.modal{background:var(--surf);border-radius:18px;width:100%;max-width:660px;
  box-shadow:var(--shl);animation:su .18s ease;flex-shrink:0;margin:auto}
@keyframes su{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhd{padding:20px 24px 15px;border-bottom:1px solid var(--bord);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mhd h3{font-size:17px;font-weight:800;letter-spacing:-.3px}
.mhd p{font-size:12.5px;color:var(--mut);margin-top:3px}
.mbody{padding:20px 24px;display:flex;flex-direction:column;gap:14px;
  max-height:66vh;overflow-y:auto}
.mft{padding:14px 24px;border-top:1px solid var(--bord);display:flex;gap:8px;justify-content:flex-end}
.xbtn{width:30px;height:30px;border-radius:99px;background:var(--surf2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .12s;font-size:14px;color:var(--mut);cursor:pointer}
.xbtn:hover{background:var(--bord)}

/* ── FORM ────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:700;color:var(--mut);
  text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{
  padding:8px 11px;border:1.5px solid var(--bord);
  border-radius:var(--rs);outline:none;
  transition:border-color .15s,background .15s;
  background:var(--surf);color:var(--txt);width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:66px}
.aif{border-color:#34d399!important;background:#f0fdf4!important}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}

/* ── IMAGE UPLOAD ────────────────────── */
.idrop{border:2px dashed var(--bord);border-radius:var(--r);padding:16px;
  text-align:center;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;min-height:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.idrop:hover{border-color:var(--blue);background:var(--blue-l)}
.idrop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.idrop p{color:var(--mut);font-size:12.5px;pointer-events:none;margin:0}
.iprev{width:100%;max-height:175px;object-fit:cover;border-radius:var(--rs);margin-top:8px}

/* ── AI BOX ──────────────────────────── */
.aibox{background:linear-gradient(135deg,#eff6ff,#f0fdf4);
  border:1.5px solid #bfdbfe;border-radius:var(--r);padding:12px 14px}
.aibox-t{font-size:11.5px;font-weight:800;color:var(--blue);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.aibox p{font-size:12.5px;color:#374151}

/* ── API KEY INLINE ──────────────────── */
.keybox{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:var(--rs);padding:12px 14px}
.keybox label{font-size:11px;font-weight:700;color:#92400e;
  text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px}
.keybox input{width:100%;padding:7px 10px;border:1.5px solid #fcd34d;border-radius:6px;
  background:#fff;outline:none;font-family:'DM Mono',monospace;font-size:12px;color:var(--txt)}
.keybox input:focus{border-color:var(--amb)}
.keybox p{font-size:11.5px;color:#92400e;margin-top:5px;line-height:1.5}

/* ── ALERTS ──────────────────────────── */
.ale{padding:9px 13px;border-radius:var(--rs);font-size:12.5px;
  font-weight:600;display:flex;align-items:center;gap:7px}
.ale-e{background:var(--red-l);border:1px solid #fca5a5;color:#b91c1c}
.ale-crit{background:var(--red-l);border:1.5px solid #fca5a5;
  border-radius:10px;padding:11px 15px;font-size:13px;font-weight:600;
  color:var(--red);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── SPINNER ─────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}

/* ── TOAST ───────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;
  z-index:999;animation:su .2s ease;box-shadow:var(--shl);max-width:280px}
.tok{background:var(--green)}
.terr{background:var(--red)}

/* ── DETAIL ──────────────────────────── */
.dp{display:flex;flex-direction:column;gap:3px}
.dp .dl{font-size:10.5px;font-weight:700;color:var(--mut);
  text-transform:uppercase;letter-spacing:.4px}
.dp .dv{font-size:13.5px;font-weight:600}
.actbox{background:var(--green-l);border:1px solid #a7f3d0;border-radius:11px;padding:14px 16px}
.actbox .al{font-size:10.5px;font-weight:700;color:var(--green);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.actbox p{font-size:13.5px;font-weight:600;color:#065f46;line-height:1.55}

/* ── CHART (pure CSS bars) ───────────── */
.barchart{display:flex;align-items:flex-end;gap:8px;height:150px;padding:0 2px}
.bg{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.bbar{border-radius:5px 5px 0 0;width:100%;min-height:3px;transition:opacity .15s}
.bbar:hover{opacity:.75}
.blbl{font-size:10px;color:var(--mut);font-weight:600;
  text-align:center;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;width:100%;max-width:56px}
.bval{font-size:11px;font-weight:800;color:var(--txt)}

/* ── PIE LEGEND ──────────────────────── */
.plgd{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.prow{display:flex;align-items:center;gap:8px;font-size:13px}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pname{flex:1;color:var(--mut);font-size:12.5px}
.pnum{font-weight:900;color:var(--txt)}
.pbar-wrap{display:flex;gap:4px;margin-top:12px;border-radius:5px;overflow:hidden;height:16px}
.pbar-seg{transition:flex .3s}

/* ── EMPTY ───────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--mut)}
.empty .eico{font-size:38px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:5px}
.empty p{font-size:13px}

/* ── ABOUT ───────────────────────────── */
.acard{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;max-width:520px;box-shadow:var(--sh)}
.info-box{background:var(--blue-l);border:1px solid #bfdbfe;border-radius:9px;padding:14px;font-size:12.5px;color:#1e40af;line-height:1.65}

/* ── MOBILE ──────────────────────────── */
.menbtn{display:none}
.sbdrop{display:none}
@media(max-width:800px){
  .sidebar{position:fixed;left:-228px;top:0;bottom:0;
    transition:left .22s;box-shadow:var(--shl)}
  .sidebar.open{left:0}
  .sbdrop{display:block;position:fixed;inset:0;
    background:rgba(0,0,0,.42);z-index:49}
  .menbtn{display:flex}
  .sgrid{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:1fr}
  .content{padding:14px}
  .fgrid{grid-template-columns:1fr}
  .modal{max-width:100%;border-radius:14px}
  .tbar{gap:6px}
}

/* mono font */
.mono{font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar" id="sb">
    <div class="logo">
      <h1>🛡️ Portal SST</h1>
      <p>GTC 45 · Colombia</p>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main">

</div>

/* ============================================================
   UTILS
============================================================ */
function esc(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function today(){return new Date().toISOString().split('T')[0];}
function nowTime(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function daysPlus(n){return new Date(Date.now()+n*864e5).toISOString().split('T')[0];}
function calcPri(p,c){
  var ps=({' Muy Alto':40,'Muy Alto':40,'Alto':20,'Medio':8,'Bajo':4})[p]||(PROB.find(function(l){return l.v===p;})||{s:0}).s;
  var cs=(CONS.find(function(l){return l.v===c;})||{s:0}).s;
  var sc=ps*cs;
  if(sc>=600)return'RI';if(sc>=150)return'RII';if(sc>=40)return'RIII';return'RIV';
}
function sbadge(s){
  var m={Completed:['bdone','✓ Ejecutado'],'In Progress':['bprog','⏳ En Proceso'],Open:['bopen','○ Abierto']};
  var r=m[s]||m.Open;
  return'<span class="badge '+r[0]+'">'+r[1]+'</span>';
}
function pbadge(p){
  var m={RI:['bri','R-I Alto'],RII:['brii','R-II Medio'],RIII:['briii','R-III Bajo'],RIV:['briv','R-IV Mín.']};
  var r=m[p]||m.RIII;
  return'<span class="badge '+r[0]+'">'+r[1]+'</span>';
}
function groupBy(arr,k){
  var m={};
  arr.forEach(function(i){m[i[k]]=(m[i[k]]||0)+1;});
  return m;
}
function toast(msg,type){
  var el=document.getElementById('troot');
  var cls=type==='err'?'terr':'tok';
  el.innerHTML='<div class="toast '+cls+'">'+esc(msg)+'</div>';
  setTimeout(function(){el.innerHTML='';},2800);
}
function uid(){return'H'+Date.now();}

function renderDashboard(){
  var f=ST.findings;
  var open=0,prog=0,done=0,crit=0;
  f.forEach(function(x){
    if(x.status==='Open')open++;
    else if(x.status==='In Progress')prog++;
    else done++;
    if(x.priority==='RI')crit++;
  });
  var byF=groupBy(f,'riskFactor');
  var maxF=1;
  Object.values(byF).forEach(function(v){if(v>maxF)maxF=v;});
  var barsH='';
  Object.entries(byF).forEach(function(e,i){
    var h=Math.round((e[1]/maxF)*120)+10;
    barsH+='<div class="bg">'+
      '<span class="bval">'+e[1]+'</span>'+
      '<div class="bbar" style="height:'+h+'px;background:'+BCOLORS[i%BCOLORS.length]+'" title="'+esc(e[0])+': '+e[1]+'"></div>'+
      '<span class="blbl" title="'+esc(e[0])+'">'+esc(e[0].substring(0,9))+'</span>'+
      '</div>';
  });
  if(!barsH)barsH='<p style="color:var(--mut);font-size:13px">Sin datos</p>';

  var byP={RI:0,RII:0,RIII:0,RIV:0};
  f.forEach(function(x){if(byP[x.priority]!==undefined)byP[x.priority]++;});
  var total=f.length||1;
  var pieH='';
  Object.entries(byP).forEach(function(e){
    pieH+='<div class="prow"><div class="pdot" style="background:'+PCOLS[e[0]]+'"></div>'+
      '<span class="pname">'+PLBLS[e[0]]+'</span><span class="pnum">'+e[1]+'</span></div>';
  });
  var segH='';
  Object.entries(byP).forEach(function(e){
    if(e[1]>0){
      var pct=Math.round((e[1]/total)*100);
      segH+='<div class="pbar-seg" style="flex:'+e[1]+';background:'+PCOLS[e[0]]+'" title="'+PLBLS[e[0]]+': '+e[1]+'"></div>';
    }
  });

  var critBanner=crit>0?
    '<div class="ale-crit">⚠️ '+crit+' hallazgo'+(crit>1?'s':'')+' R-I (Alto) requiere'+(crit>1?'n':'')+' atención inmediata.</div>':'';

  document.getElementById('content').innerHTML=
    critBanner+
    '<div class="sgrid">'+
      '<div class="card"><div class="slbl">Total</div><div class="sval">'+f.length+'</div></div>'+
      '<div class="card"><div class="slbl">Abiertos</div><div class="sval" style="color:var(--red)">'+open+'</div></div>'+
      '<div class="card"><div class="slbl">En Proceso</div><div class="sval" style="color:var(--amb)">'+prog+'</div></div>'+
      '<div class="card"><div class="slbl">Ejecutados</div><div class="sval" style="color:var(--green)">'+done+'</div></div>'+
    '</div>'+
    '<div class="cgrid">'+
      '<div class="card"><div class="ctitle">📊 Por Factor de Riesgo</div><div class="barchart">'+barsH+'</div></div>'+
      '<div class="card"><div class="ctitle">🎯 Por Nivel de Riesgo GTC 45</div>'+
        '<div class="plgd">'+pieH+'</div>'+
        (segH?'<div class="pbar-wrap">'+segH+'</div>':'')+
      '</div>'+
    '</div>';
}

function filteredF(){
  var q=ST.search.toLowerCase();
  return ST.findings.filter(function(f){
    var match=!q||[f.id,f.area,f.riskFactor,f.department,f.description,f.riskDetail]
      .some(function(v){return String(v||'').toLowerCase().indexOf(q)>=0;});
    return match&&(!ST.fStatus||f.status===ST.fStatus)&&(!ST.fPriority||f.priority===ST.fPriority);
  });
}

/* ============================================================
   IMAGE HANDLER
============================================================ */
function handleImg(input){
  var file=input.files&&input.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){showErr('La imagen no debe superar 5 MB.');return;}
  if(file.type.indexOf('image/')<0){showErr('Solo se permiten imágenes JPG o PNG.');return;}
  var reader=new FileReader();
  reader.onloadend=function(){
    FD.imageUrl=reader.result;
    var ph=document.getElementById('iph');if(ph)ph.remove();
    var prev=document.getElementById('iprev');
    if(!prev){
      prev=document.createElement('img');
      prev.id='iprev';prev.className='iprev';
      var drop=document.getElementById('idrop');
      if(drop)drop.appendChild(prev);
    }
    prev.src=reader.result;
    var btn=document.getElementById('aibtn');
    if(btn)btn.disabled=false;
  };
  reader.readAsDataURL(file);
}

============================================================ */
function runAI(){
  if(!FD.imageUrl){showErr('Primero sube una imagen.');return;}
  clearErr();
  const prompt=`Analiza esta evidencia según GTC 45 Colombia y devuelve JSON con: riskFactor, riskDetail, description, probabilityLevel, consequenceLevel, intervention, action.`;
  const texto = prompt + '\n\n1. Abre ChatGPT o Google AI Studio.\n2. Sube la imagen.\n3. Pega este prompt.\n4. Copia el JSON devuelto y pégalo abajo.';
  const box = document.getElementById('aires');
  box.innerHTML = `
    <div class="aibox">
      <div class="aibox-t">Asistente IA externo</div>
      <textarea id="iaPastePrompt" style="width:100%;min-height:120px">${prompt}</textarea>
      <textarea id="iaPasteResult" placeholder="Pega aquí la respuesta JSON de la IA" style="width:100%;min-height:160px;margin-top:8px"></textarea>
      <button class="btn bp" onclick="applyExternalAI()" style="margin-top:8px">Aplicar respuesta IA</button>
    </div>`;
}
function applyExternalAI(){
  try{
    const raw=document.getElementById('iaPasteResult').value.trim();

    let data;

    try{
      data=JSON.parse(raw);
    }catch(e){
      data={};

      const get=(label)=>{
        const r=new RegExp(label+'\\s*[:\\-]\\s*(.+)','i');
        const m=raw.match(r);
        return m?m[1].split('\\n')[0].trim():'';
      };

      data.riskFactor=get('factor de riesgo');
      data.riskDetail=get('detalle');
      data.description=get('descripción');
      data.probabilityLevel=get('probabilidad');
      data.consequenceLevel=get('consecuencia');
      data.intervention=get('intervención');
      data.action=get('acción');
    }

    AIF=[];

    ['riskFactor','riskDetail','description','probabilityLevel','consequenceLevel','intervention','action']
    .forEach(k=>{
      if(data[k]){
        FD[k]=data[k];
        AIF.push(k);
      }
    });

    showModal();

    const res2=document.getElementById('aires');
    if(res2)res2.innerHTML='<div class=\"aibox\"><div class=\"aibox-t\">✓ Datos importados</div><p>Campos completados.</p></div>';

  }catch(e){
    showErr('No se pudo interpretar la respuesta IA.');
  }
}

/* ============================================================
   SAVE FINDING
============================================================ */
function saveF2(){
  // Collect all form values
  var get=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  FD.date=get('fi-date');
  FD.time=get('fi-time');
  FD.city=get('fi-city');
  FD.area=get('fi-area');
  FD.department=get('fi-dep');
  FD.responsible=get('fi-resp');
  FD.riskFactor=get('fi-rf');
  FD.riskDetail=get('fi-rd');
  FD.description=get('fi-desc');
  FD.probabilityLevel=get('fi-prob');
  FD.consequenceLevel=get('fi-cons');
  FD.intervention=get('fi-int');
  FD.status=get('fi-sta');
  FD.action=get('fi-act');
  FD.complianceDate=get('fi-comp');

  // Save key if entered
  var ki=document.getElementById('keyinp');
  if(ki&&ki.value.trim())setKey(ki.value.trim());

  if(!FD.description){showErr('La descripción del hallazgo es obligatoria.');return;}
  if(!FD.area){showErr('El área / ubicación es obligatoria.');return;}

  FD.priority=calcPri(FD.probabilityLevel,FD.consequenceLevel);

  if(EID){
    FD.id=EID;
    ST.findings=ST.findings.map(function(f){return f.id===EID?Object.assign({},FD):f;});
    toast('Hallazgo actualizado correctamente');
  }else{
    FD.id=uid();
    ST.findings=ST.findings.concat([Object.assign({},FD)]);
    toast('Hallazgo registrado correctamente');
  }
  saveF();
  closeModal();
  renderAll();
}

function delF(id){
  if(!confirm('¿Eliminar este hallazgo?'))return;
  ST.findings=ST.findings.filter(function(f){return f.id!==id;});
  saveF();toast('Hallazgo eliminado','err');renderAll();
}
function shareF(id){
  var f=ST.findings.find(function(x){return x.id===id;});if(!f)return;
  var txt='Hallazgo '+f.id+': '+f.riskFactor+'\nÁrea: '+f.city+' – '+f.area+'\nDescripción: '+f.description+'\nAcción: '+f.action;
  if(navigator.share){navigator.share({title:'Hallazgo SST',text:txt}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){toast('Copiado al portapapeles');});}
}

/* ============================================================
   EXPORT EXCEL
============================================================ */
var xlsxLoaded=false;
function doExport(){
  if(xlsxLoaded){doXLSX();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=function(){xlsxLoaded=true;doXLSX();};
  s.onerror=function(){toast('No se pudo cargar xlsx','err');};
  document.head.appendChild(s);
}
function doXLSX(){
  var rows=ST.findings.map(function(f){
    return{
      ID:f.id,Fecha:f.date,Hora:f.time,Ciudad:f.city,'Área':f.area,
      Departamento:f.department,Responsable:f.responsible,
      'Factor de Riesgo':f.riskFactor,'Detalle Riesgo':f.riskDetail,
      'Descripción':f.description,'Nivel Probabilidad':f.probabilityLevel,
      'Nivel Consecuencia':f.consequenceLevel,'Nivel de Riesgo':f.priority,
      'Intervención':f.intervention,'Acción Correctiva':f.action,
      'Fecha Cumplimiento':f.complianceDate,Estado:f.status
    };
  });
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'Hallazgos',ws);
  XLSX.writeFile(wb,'Hallazgos_SST_'+today()+'.xlsx');
  toast('Excel exportado correctamente');
}
