    .row-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .15s; }

/* ─── HELPERS ─── */
function StatusBadge({status}) {
  const cls = status==='Completed'?'badge-done':status==='In Progress'?'badge-progress':'badge-open';
  const lbl = status==='Completed'?'Ejecutado':status==='In Progress'?'En Proceso':'Abierto';
  return <span className={`badge ${cls}`}><span style={{width:6,height:6,borderRadius:'50%',background:'currentColor',display:'inline-block'}}></span>{lbl}</span>;
}
function PriorityBadge({priority}) {
  const cls = {RI:'badge-ri',RII:'badge-rii',RIII:'badge-riii',RIV:'badge-riv'}[priority]||'badge-riii';
  const lbl = {RI:'R-I Alto',RII:'R-II Medio',RIII:'R-III Bajo',RIV:'R-IV Mínimo'}[priority]||priority;
  return <span className={`badge ${cls}`}>{lbl}</span>;
}
function Toast({msg,type,onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2800); return()=>clearTimeout(t); },[]);
  return <div className={`toast ${type}`}>{msg}</div>;
}

/* ─── CLAUDE AI ANALYSIS ─── */
async function analyzeWithClaude(imageBase64, apiKey) {
  const base64Data = imageBase64.replace(/^data:image\/\w+;base64,/,'');
  const mimeMatch = imageBase64.match(/^data:(image\/\w+);base64,/);
  const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';

  const prompt = `Eres un experto en Seguridad y Salud en el Trabajo (SST) colombiana. Analiza esta imagen de inspección de seguridad ocupacional e identifica el hallazgo o peligro presente según la metodología GTC 45 de Colombia.

Responde ÚNICAMENTE con un objeto JSON válido, sin texto adicional, con exactamente esta estructura:
{
  "riskFactor": "<uno de: Biomecánico | Psicosocial | Físico | Químico | Biológico | Seguridad | Fenómenos Naturales>",
  "riskDetail": "<subcategoría específica según GTC 45, ej: Locativo, Eléctrico, Trabajo en alturas, Ruido, etc.>",
  "description": "<descripción profesional del hallazgo observado en la imagen, máximo 2 oraciones>",
  "probabilityLevel": "<uno de: Muy Alto | Alto | Medio | Bajo>",
  "consequenceLevel": "<uno de: Catastrófico | Peligroso | Leve | Marginal>",
  "intervention": "<uno de: Eliminación | Sustitución | Controles Ingeniería | Controles Administrativos | EPP>",
  "action": "<acción correctiva específica recomendada, máximo 2 oraciones>"
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64Data } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(()=>({}));
    throw new Error(err?.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  const text = data.content?.find(b=>b.type==='text')?.text || '';
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

  const [analyzing, setAnalyzing] = useState(false);

  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleImage = (e) => {
    const file = e.target.files?.[0];

    const reader = new FileReader();

    if(!form.imageUrl){ setErr('Primero sube una imagen para analizar.'); return; }
    if(!apiKey){ setErr('Configura tu clave de API Claude en Configuración primero.'); return; }
    setAnalyzing(true); setErr('');

      const data = await analyzeWithClaude(form.imageUrl, apiKey);
      const fields = [];
      const update = {};
      ['riskFactor','riskDetail','description','probabilityLevel','consequenceLevel','intervention','action'].forEach(k=>{
        if(data[k]){ update[k]=data[k]; fields.push(k); }
      });
      setForm(p=>({...p,...update}));
      setAiFields(fields);
    } catch(e) {
      setErr('Error de análisis: ' + e.message);
    } finally { setAnalyzing(false); }

  const handleSubmit = () => {
    if(!form.description){ setErr('La descripción es obligatoria.'); return; }

const COLORS = ['#1d4ed8','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#db2777'];
function Dashboard({findings}) {
  const byFactor = useMemo(()=>{
    const m = {};
    findings.forEach(f=>{m[f.riskFactor]=(m[f.riskFactor]||0)+1;});
    return Object.entries(m).map(([name,value])=>({name:name.substring(0,10),value}));
  },[findings]);
  const byPriority = useMemo(()=>{
    const m = {RI:0,RII:0,RIII:0,RIV:0};
    findings.forEach(f=>{ if(m[f.priority]!==undefined) m[f.priority]++; });
    return [
      {name:'R-I Alto',value:m.RI,fill:'#dc2626'},
      {name:'R-II Medio',value:m.RII,fill:'#d97706'},
      {name:'R-III Bajo',value:m.RIII,fill:'#ca8a04'},
      {name:'R-IV Mínimo',value:m.RIV,fill:'#059669'},
    ];
  },[findings]);

  const open = findings.filter(f=>f.status==='Open').length;
  const inProgress = findings.filter(f=>f.status==='In Progress').length;
  const done = findings.filter(f=>f.status==='Completed').length;
  const critical = findings.filter(f=>f.priority==='RI').length;

  return (
    <div>
      <div className="stats-grid">
        <div className="card"><div className="card-title">Total Hallazgos</div><div className="card-value">{findings.length}</div><div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>registrados</div></div>
        <div className="card"><div className="card-title">Abiertos</div><div className="card-value" style={{color:'var(--danger)'}}>{open}</div><div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>requieren acción</div></div>
        <div className="card"><div className="card-title">En Proceso</div><div className="card-value" style={{color:'var(--warning)'}}>{inProgress}</div><div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>en seguimiento</div></div>
        <div className="card"><div className="card-title">Ejecutados</div><div className="card-value" style={{color:'var(--success)'}}>{done}</div><div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>cerrados</div></div>
      </div>
      {critical>0 && (
        <div style={{background:'#fef2f2',border:'1.5px solid #fca5a5',borderRadius:10,padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',gap:10,fontSize:13.5,fontWeight:600,color:'#b91c1c'}}>
          <Icon d={Icons.alert} size={18} stroke="#dc2626"/> {critical} hallazgo{critical>1?'s':''} de nivel R-I (Alto) requieren{critical===1?'':''} atención inmediata.
        </div>
      )}
      <div className="charts-grid">
        <div className="card">
          <div style={{fontWeight:700,marginBottom:16,fontSize:14}}>Hallazgos por Factor de Riesgo</div>
          <Recharts.ResponsiveContainer width="100%" height={220}>
            <Recharts.BarChart data={byFactor} margin={{top:0,right:0,left:-20,bottom:0}}>
              <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <Recharts.XAxis dataKey="name" tick={{fontSize:11}} />
              <Recharts.YAxis tick={{fontSize:11}} allowDecimals={false}/>
              <Recharts.Tooltip/>
              <Recharts.Bar dataKey="value" name="Hallazgos" radius={[6,6,0,0]}>
                {byFactor.map((e,i)=><Recharts.Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
              </Recharts.Bar>
            </Recharts.BarChart>
          </Recharts.ResponsiveContainer>
        </div>
        <div className="card">
          <div style={{fontWeight:700,marginBottom:16,fontSize:14}}>Distribución por Nivel de Riesgo</div>
          <Recharts.ResponsiveContainer width="100%" height={220}>
            <Recharts.PieChart>
              <Recharts.Pie data={byPriority} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({name,value})=>`${name}: ${value}`} labelLine={true}>
                {byPriority.map((e,i)=><Recharts.Cell key={i} fill={e.fill}/>)}
              </Recharts.Pie>
              <Recharts.Tooltip/>
            </Recharts.PieChart>
          </Recharts.ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

                {filtered.map(f=>(
                  <tr key={f.id} onClick={()=>onView(f)} style={{cursor:'pointer'}}>
                    <td><span className="mono" style={{fontSize:12,fontWeight:700}}>{f.id}</span></td>
                    <td style={{fontSize:12.5}}>{f.date}</td>
                    <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13}}>{f.area||'–'}</td>
                    <td><span style={{fontWeight:600,fontSize:13}}>{f.riskFactor}</span><br/><span style={{fontSize:11,color:'var(--text-muted)'}}>{f.riskDetail}</span></td>
                    <td style={{fontSize:13}}>{f.department}</td>
                    <td><PriorityBadge priority={f.priority}/></td>
                    <td><StatusBadge status={f.status}/></td>
                    <td onClick={e=>e.stopPropagation()}>
                      <div className="row-actions">
                        <button className="btn btn-outline btn-sm" onClick={()=>onEdit(f)} title="Editar"><Icon d={Icons.edit} size={12}/></button>
                        <button className="btn btn-sm" style={{color:'var(--danger)',border:'1.5px solid #fca5a5'}} onClick={()=>onDelete(f.id)} title="Eliminar"><Icon d={Icons.trash} size={12}/></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
        }
      </div>
      <div style={{padding:'12px 0',fontSize:12,color:'var(--text-muted)',textAlign:'right'}}>{filtered.length} de {findings.length} hallazgos</div>
    </div>
  );
}

/* ─── SETTINGS ─── */
function Settings({apiKey, onSave}) {
  const [key, setKey] = useState(apiKey||'');
  const [saved, setSaved] = useState(false);
  const save = () => { onSave(key.trim()); setSaved(true); setTimeout(()=>setSaved(false),2000); };
  return (
    <div>
      <div className="settings-card">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <div style={{width:40,height:40,background:'var(--accent-light)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent)'}}>
            <Icon d={Icons.key} size={18}/>
          </div>
          <div>
            <div style={{fontWeight:800,fontSize:15}}>Clave de API – Claude</div>
            <div style={{fontSize:12.5,color:'var(--text-muted)'}}>Necesaria para el análisis automático con IA</div>
          </div>
        </div>
        <div style={{background:'var(--warning-light)',border:'1px solid #fcd34d',borderRadius:8,padding:'10px 14px',fontSize:12.5,color:'#92400e',marginBottom:18,lineHeight:1.5}}>
          <strong>Importante:</strong> Tu clave se guarda solo en este navegador (localStorage) y nunca sale de tu dispositivo. Obtén tu clave en{' '}
          <a href="https://console.anthropic.com" target="_blank" rel="noopener" style={{color:'var(--accent)'}}>console.anthropic.com</a>
        </div>
        <div className="form-group" style={{marginBottom:14}}>
          <label>API Key</label>
          <input type="password" className="key-input" value={key} onChange={e=>setKey(e.target.value)}
            placeholder="sk-ant-…" style={{width:'100%'}}/>
        </div>
        <button className="btn btn-primary" onClick={save} style={{width:'100%',justifyContent:'center'}}>
          {saved ? <><Icon d={Icons.check} size={14}/> Guardada</> : 'Guardar clave'}
        </button>
      </div>
      <div className="settings-card" style={{marginTop:20}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Sobre la aplicación</div>
        <p style={{fontSize:13.5,color:'var(--text-muted)',lineHeight:1.7}}>
          <strong>Portal SST – GTC 45</strong> permite registrar, analizar y gestionar hallazgos de inspección de seguridad y salud en el trabajo según la metodología colombiana GTC 45.<br/><br/>
          La IA (Claude de Anthropic) analiza fotografías de inspección y sugiere automáticamente el factor de riesgo, nivel de probabilidad, consecuencia, intervención y acción correctiva.<br/><br/>
          Todos los datos se guardan localmente en tu navegador.
        </p>
      </div>
    </div>
  );
}

/* ─── APP PRINCIPAL ─── */
export default function App() {
  const [tab, setTab] = useState('dashboard');
  const [findings, setFindings] = useState(()=>{
    try { const s=localStorage.getItem('sst_findings'); return s?JSON.parse(s):DEFAULT_FINDINGS; } catch{return DEFAULT_FINDINGS;}
  });
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem('sst_api_key')||'');
  const [modalAdd, setModalAdd] = useState(false);
  const [modalEdit, setModalEdit] = useState(null);
  const [modalView, setModalView] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(()=>{ localStorage.setItem('sst_findings',JSON.stringify(findings)); },[findings]);
  useEffect(()=>{ localStorage.setItem('sst_api_key',apiKey); },[apiKey]);

  const showToast = (msg,type='success') => setToast({msg,type});

  const handleSave = (data) => {
    if(modalEdit) {
      setFindings(prev=>prev.map(f=>f.id===modalEdit.id?{...data,id:modalEdit.id}:f));
      setModalEdit(null);
      showToast('Hallazgo actualizado correctamente');
    } else {
      const id = 'H'+(findings.length+1);
      setFindings(prev=>[...prev,{...data,id}]);
      setModalAdd(false);
      showToast('Hallazgo registrado correctamente');
    }
  };

  const handleDelete = (id) => {
    if(!confirm('¿Eliminar este hallazgo?')) return;
    setFindings(prev=>prev.filter(f=>f.id!==id));
    setModalView(null);
    showToast('Hallazgo eliminado','error');
  };

  const handleExport = () => {
    const rows = findings.map(f=>({
      ID:f.id, Fecha:f.date, Hora:f.time, Ciudad:f.city, Área:f.area, Departamento:f.department,
      Responsable:f.responsible, 'Factor de Riesgo':f.riskFactor, 'Detalle Riesgo':f.riskDetail,
      Descripción:f.description, 'Nivel Probabilidad':f.probabilityLevel, 'Nivel Consecuencia':f.consequenceLevel,
      'Nivel de Riesgo':f.priority, Intervención:f.intervention, 'Acción Correctiva':f.action,
      'Fecha Cumplimiento':f.complianceDate, Estado:f.status
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'Hallazgos',ws);
    XLSX.writeFile(wb,`Hallazgos_SST_${new Date().toISOString().split('T')[0]}.xlsx`);
    showToast('Excel exportado correctamente');
  };

  const navItems = [
    {id:'dashboard',label:'Dashboard',icon:<Icon d={Icons.dashboard} size={16}/>},
    {id:'findings',label:'Hallazgos',icon:<Icon d={Icons.findings} size={16}/>},
    {id:'settings',label:'Configuración',icon:<Icon d={Icons.settings} size={16}/>},
  ];

  const titles = {dashboard:'Dashboard',findings:'Hallazgos SST',settings:'Configuración'};

  return (
    <div className="app">
      {sidebarOpen && <div className="sidebar-backdrop" onClick={()=>setSidebarOpen(false)}/>}
      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-logo">
          <h1>Portal SST</h1>
          <p>GTC 45 · Colombia</p>
        </div>
        <nav className="sidebar-nav">
          {navItems.map(n=>(
            <div key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>{setTab(n.id);setSidebarOpen(false);}}>
              {n.icon}<span>{n.label}</span>
            </div>
          ))}
          <div className="nav-sep"/>
          {!apiKey && (
            <div style={{padding:'8px 12px',background:'#fef3c7',borderRadius:8,fontSize:12,color:'#92400e',fontWeight:600,cursor:'pointer'}} onClick={()=>{setTab('settings');setSidebarOpen(false);}}>
              ⚠️ Configura tu API Key para usar IA
            </div>
          )}
        </nav>
      </aside>

      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button className="btn btn-outline btn-sm mobile-menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}><Icon d={Icons.menu} size={16}/></button>
            <h2>{titles[tab]}</h2>
          </div>
          {tab==='findings' && (
            <button className="btn btn-primary btn-sm" onClick={()=>setModalAdd(true)}>
              <Icon d={Icons.plus} size={13}/> Nuevo Hallazgo
            </button>
          )}
        </div>
        <div className="content">
          {!apiKey && tab!=='settings' && (
            <div className="api-banner">
              <Icon d={Icons.alert} size={15}/>
              <span>Para usar el análisis con IA, primero <strong style={{cursor:'pointer',textDecoration:'underline'}} onClick={()=>setTab('settings')}>configura tu API Key de Claude</strong>.</span>
            </div>
          )}
          {tab==='dashboard' && <Dashboard findings={findings}/>}
          {tab==='findings' && (
            <FindingsTable
              findings={findings}
              apiKey={apiKey}
              onAdd={()=>setModalAdd(true)}
              onView={setModalView}
              onEdit={f=>{setModalEdit(f);setModalView(null);}}
              onDelete={handleDelete}
              onExport={handleExport}
            />
          )}
          {tab==='settings' && <Settings apiKey={apiKey} onSave={setApiKey}/>}
        </div>
      </div>

      {/* Modals */}
      {modalAdd && <FindingModal apiKey={apiKey} onSave={handleSave} onClose={()=>setModalAdd(false)}/>}
      {modalEdit && <FindingModal initial={modalEdit} apiKey={apiKey} onSave={handleSave} onClose={()=>setModalEdit(null)}/>}
      {modalView && <DetailModal finding={modalView} onClose={()=>setModalView(null)} onEdit={f=>{setModalEdit(f);setModalView(null);}} onDelete={handleDelete}/>}

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
